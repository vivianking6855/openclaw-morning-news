<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史归档 - AI DevOps晨报</title>
    <style>
        :root {
            --primary: #1d1d1f;
            --secondary: #86868b;
            --accent: #0071e3;
            --bg: #f5f5f7;
            --card-bg: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--primary);
            line-height: 1.6;
        }
        .header {
            background: var(--primary);
            color: #fff;
            padding: 40px 20px;
            text-align: center;
        }
        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }
        .header a {
            color: var(--accent);
            text-decoration: none;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .archive-list {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .archive-item {
            padding: 20px 25px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }
        .archive-item:hover {
            background: #f9f9f9;
        }
        .archive-item:last-child {
            border-bottom: none;
        }
        .archive-date {
            font-weight: 600;
            font-size: 16px;
        }
        .archive-title {
            color: var(--secondary);
            font-size: 14px;
            flex: 1;
            margin-left: 20px;
        }
        .archive-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        footer {
            background: var(--primary);
            color: #fff;
            text-align: center;
            padding: 40px 20px;
            margin-top: 60px;
        }
        footer p {
            color: #a1a1a6;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>📚 历史归档</h1>
        <p><a href="index.html">← 返回首页</a></p>
    </header>

    <main class="container">
        <div class="archive-list">
            <div class="archive-item">
                <span class="archive-date">2026年4月7日</span>
                <span class="archive-title">星海图估值突破200亿 | 智元万台下线 | K8s v1.34发布</span>
                <a href="2026-04-07.html" class="archive-link">阅读 →</a>
            </div>
        </div>
    </main>

    <footer>
        <p>AI DevOps晨报 · 历史归档</p>
    </footer>
</body>
</html>
