<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI DevOps晨报 - 每日精选AI、云原生、机器人与项目管理动态</title>
    <style>
        :root {
            --primary: #1d1d1f;
            --secondary: #86868b;
            --accent: #0071e3;
            --bg: #f5f5f7;
            --card-bg: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--primary);
            line-height: 1.6;
        }
        .hero {
            background: linear-gradient(135deg, #1d1d1f 0%, #434344 100%);
            color: #fff;
            padding: 80px 20px;
            text-align: center;
        }
        .hero h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 15px;
        }
        .hero p {
            font-size: 18px;
            color: #a1a1a6;
            max-width: 600px;
            margin: 0 auto;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .section-title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 30px;
            text-align: center;
        }
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
        }
        .news-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        }
        .news-card .date {
            font-size: 12px;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 10px;
        }
        .news-card h3 {
            font-size: 18px;
            margin-bottom: 12px;
        }
        .news-card p {
            color: var(--secondary);
            font-size: 14px;
            margin-bottom: 15px;
        }
        .news-card a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }
        .archives-link {
            text-align: center;
            margin-top: 50px;
        }
        .btn {
            display: inline-block;
            background: var(--accent);
            color: #fff;
            padding: 15px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #0051a3;
        }
        footer {
            background: var(--primary);
            color: #fff;
            text-align: center;
            padding: 40px 20px;
            margin-top: 60px;
        }
        footer p {
            color: #a1a1a6;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <header class="hero">
        <h1>AI DevOps 晨报</h1>
        <p>每日精选人工智能、云原生、具身智能与项目管理领域的最新动态，助你把握技术脉搏</p>
    </header>

    <main class="container">
        <h2 class="section-title">📰 最新晨报</h2>
        <div class="news-grid">
            <div class="news-card">
                <div class="date">2026年4月7日</div>
                <h3>星海图估值突破200亿 | 智元万台下线</h3>
                <p>具身智能头部格局加速形成，Kubernetes v1.34正式发布带来DRA GA，OpenAI发布ChatGPT Agent开启自主执行新时代...</p>
                <a href="2026-04-07.html">阅读完整晨报 →</a>
            </div>
        </div>

        <div class="archives-link">
            <a href="archives.html" class="btn">查看历史归档</a>
        </div>
    </main>

    <footer>
        <p>AI DevOps晨报 · 每日更新 · 聚焦技术前沿</p>
        <p style="margin-top: 10px;">GitHub Pages托管</p>
    </footer>
</body>
</html>
